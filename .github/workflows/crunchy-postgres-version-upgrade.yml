name: Crunchy DB - Postgres Version Upgrade
run-name: Crunchy DB - Postgres version upgrade in ${{ inputs.environment }} using ${{ github.ref_name }}
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: environment
      from_version:
        description: "Source PostgreSQL version for upgrade (e.g. 17)"
        required: true
        type: string
      to_version:
        description: "Target PostgreSQL version for upgrade (e.g. 18)"
        required: true
        type: string
      postgres_image_tag:
        description: "If the upgraded cluster requires a manual image, specify the image tag.(e.g. ubi9-18.1-2547)"
        required: false
        type: string
        default: ""

jobs:
  upgradePostgresVersion:
    name: Postgres version upgrade in ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      NAMESPACE: ${{ secrets.OPENSHIFT_ENV_NAMESPACE }}
    steps:
      - name: Checkout Target Branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
      - name: Install CLI tools from OpenShift Mirror
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"
      - name: Log in to OpenShift
        run: |
          oc login --token=${{ secrets.SA_TOKEN }} --server=${{ vars.OPENSHIFT_CLUSTER_URL }}
      - name: Upgrade Crunchy Postgres Version
        working-directory: "./devops/helm/crunchy-postgres/"
        run: |
          make pg-upgrade NAMESPACE=${NAMESPACE} FROM_VERSION="${{ inputs.from_version }}" TO_VERSION="${{ inputs.to_version }}" POSTGRES_IMAGE_TAG="${{ inputs.postgres_image_tag }}"

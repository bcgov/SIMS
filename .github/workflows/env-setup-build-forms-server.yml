name: Env Setup - Build Forms Server
run-name: Env Setup - Build forms server from Git reference ${{ github.ref_name }} (formio build ${{ github.event.inputs.formioTargetVersion }}-${{ github.run_number }})
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      formioTargetVersion:
        description: "Form.io target version"
        required: true
        default: "v9.7.7"

jobs:
  build:
    name: Build Forms Server
    runs-on: ubuntu-latest
    env:
      BUILD_NAMESPACE: ${{ vars.BUILD_NAMESPACE }}
      FORMIO_BUILD_TAG: "${{ github.event.inputs.formioTargetVersion }}-${{ github.run_number }}"
    steps:
      - name: Install CLI tools from OpenShift Mirror
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"
      - name: Print env
        run: |
          echo BUILD NAMESPACE: $BUILD_NAMESPACE
          echo FORMIO_BUILD_TAG: $FORMIO_BUILD_TAG
          echo OC CLI Version: $(oc version)
      # Checkout the PR branch
      - name: Checkout Target Branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
      # Log in to OpenShift.
      - name: Log in to OpenShift
        run: |
          oc login --token=${{ secrets.SA_TOKEN }} --server=${{ vars.OPENSHIFT_CLUSTER_URL }}
      # Build Forms
      - name: Build Forms Server
        working-directory: "./devops/"
        run: |
          make oc-build-forms

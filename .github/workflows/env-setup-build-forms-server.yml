name: Env Setup - Build Forms Server
run-name: Env Setup - Build forms server from ${{ github.ref_name }}(form.io Git reference ${{ inputs.formioRepoRef }})
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      formioRepoRef:
        description: "Form.io Git reference, please refer https://github.com/formio/formio for commits or tags."
        type: string
        required: true
        default: "ff103279a0766400874422b655a65c0843ee5be5"

jobs:
  build:
    name: Build Forms Server
    runs-on: ubuntu-latest
    env:
      BUILD_NAMESPACE: ${{ vars.BUILD_NAMESPACE }}
      FORMIO_SOURCE_REPO_REF: ${{ inputs.formioRepoRef }}
    steps:
      - name: Install CLI tools from OpenShift Mirror
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"
      - name: Print env
        run: |
          echo BUILD NAMESPACE: $BUILD_NAMESPACE
          echo BRANCH: $BUILD_REF
          echo OC CLI Version: $(oc version)
      # Checkout the PR branch
      - name: Checkout Target Branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
      # Log in to OpenShift.
      - name: Log in to OpenShift
        run: |
          oc login --token=${{ secrets.SA_TOKEN }} --server=${{ vars.OPENSHIFT_CLUSTER_URL }}
      # Build Forms
      - name: Build Forms server
        working-directory: "./devops/"
        run: |
          make oc-build-forms

name: Env Setup - Deploy Forms Server
run-name: Env Setup - Deploy forms server from Git reference ${{ github.ref_name }}(Form.io build tag ${{ inputs.formioBuildTag }}) to ${{ inputs.environment }}
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment the formio is deployed."
        required: true
        type: environment
      formioBuildTag:
        description: "Previously built Form.io build tag (e.g., v9.7.7-99)."
        type: string
        required: true
        default: "v9.7.7-0"

jobs:
  deploy:
    name: Deploy Forms Server
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      FORMS_NAME: forms
      NAMESPACE: ${{ secrets.OPENSHIFT_ENV_NAMESPACE }}
      BUILD_NAMESPACE: ${{ vars.BUILD_NAMESPACE }}
      FORMIO_BUILD_TAG: ${{ inputs.formioBuildTag }}
      HOST_PREFIX: ${{ secrets.HOST_PREFIX }}
      MONGODB_URI: ${{ secrets.MONGODB_URI }}
      FORMIO_ROOT_EMAIL: ${{ secrets.FORMS_SA_USER_NAME }}
      FORMIO_ROOT_PASSWORD: ${{ secrets.FORMS_SA_PASSWORD }}
      FORMIO_API_KEY: ${{ secrets.FORMS_API_KEY }}
      FORMIO_CPU_REQUEST: ${{ vars.FORMIO_CPU_REQUEST }}
      FORMIO_MEMORY_REQUEST: ${{ vars.FORMIO_MEMORY_REQUEST }}
      FORMIO_MEMORY_LIMIT: ${{ vars.FORMIO_MEMORY_LIMIT }}
      FORMIO_REPLICAS: ${{ vars.FORMIO_REPLICAS }}
    steps:
      - name: Install CLI tools from OpenShift Mirror
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"
      - name: Print env
        run: |
          echo NAMESPACE: $NAMESPACE
          echo HOST_PREFIX: $HOST_PREFIX
          echo OC CLI Version: $(oc version)
      # Checkout the PR branch
      - name: Checkout Target Branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}
      # Log in to OpenShift.
      - name: Log in to OpenShift
        run: |
          oc login --token=${{ secrets.SA_TOKEN }} --server=${{ vars.OPENSHIFT_CLUSTER_URL }}
      # Deploy Forms
      - name: Deploy Forms server
        working-directory: "./devops/"
        run: |
          make oc-deploy-forms

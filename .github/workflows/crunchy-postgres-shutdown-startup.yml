name: Crunchy Postgres - Shutdown/Startup
run-name: Crunchy DB shutdown or startup in ${{ inputs.environment }} using ${{ github.ref_name }}
permissions:
    contents: read

on:
    workflow_dispatch:
        inputs:
            environment:
                description: "Environment"
                required: true
                type: environment
            action:
                description: "Action"
                required: true
                type: choice
                options:
                    - shutdown
                    - startup

jobs:
    crunchyDBShutdownStartup:
        name: Crunchy DB ${{ inputs.action }} in ${{ inputs.environment }}
        runs-on: ubuntu-latest
        environment: ${{ inputs.environment }}
        env:
            NAMESPACE: ${{ secrets.OPENSHIFT_ENV_NAMESPACE }}
            SA_TOKEN: ${{ secrets.SA_TOKEN }}
            OPENSHIFT_CLUSTER_URL: ${{ vars.OPENSHIFT_CLUSTER_URL }}
        steps:
            - name: Checkout Target Branch
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.ref_name }}
            - name: Install CLI tools from OpenShift Mirror
              uses: redhat-actions/openshift-tools-installer@v1
              with:
                  oc: "4"
            - name: Log in to OpenShift
              run: |
                  oc login --token="$SA_TOKEN" --server="$OPENSHIFT_CLUSTER_URL"
            - name: Crunchy DB shutdown in ${{ inputs.environment }}
              if: ${{ inputs.action == 'shutdown' }}
              working-directory: "./devops/helm/crunchy-postgres/"
              run: |
                  make shutdown-cluster NAMESPACE="$NAMESPACE"
            - name: Crunchy DB startup in ${{ inputs.environment }}
              if: ${{ inputs.action == 'startup' }}
              working-directory: "./devops/helm/crunchy-postgres/"
              run: |
                  make startup-cluster NAMESPACE="$NAMESPACE"

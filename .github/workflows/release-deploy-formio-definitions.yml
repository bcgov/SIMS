name: Release - Deploy Form.io resources
run-name: Release - Deploy Form.io resources from ${{ inputs.gitRef }} to ${{ inputs.environment }}
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        required: true
        type: environment
      gitRef:
        description: "Github reference"
        required: true
        type: string
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      gitRef:
        required: true
        type: string
    secrets:
      FORMS_URL:
        required: true
      FORMS_SA_USER_NAME:
        required: true
      FORMS_SA_PASSWORD:
        required: true

jobs:
  deploy:
    name: Deploy Form.io definitions
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      FORMS_URL: ${{ secrets.FORMS_URL }}
      FORMS_SA_USER_NAME: ${{ secrets.FORMS_SA_USER_NAME }}
      FORMS_SA_PASSWORD: ${{ secrets.FORMS_SA_PASSWORD }}
    steps:
      - name: Install CLI tools from OpenShift Mirror
        uses: redhat-actions/openshift-tools-installer@v1
        with:
          oc: "4"
      - name: Print env
        run: |
          echo Deploy Environment: ${{ inputs.environment }}
          echo GIT REF: ${{ github.ref_name }}
          echo BUILD NAMESPACE: $BUILD_NAMESPACE
          echo OC CLI Version: $(oc version)
      - name: Checkout Target Branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}
      - name: Log in to OpenShift
        run: |
          oc login --token=${{ secrets.SA_TOKEN }} --server=${{ vars.OPENSHIFT_CLUSTER_URL }}
      - name: Run db-migrations using REPL mode
        working-directory: "./devops/"
        run: |
          make deploy-form-definitions

name: Prune Images
run-name: Pruning all but the most recent ${{ inputs.minTags }} tags prior to what is deployed in ${{ inputs.environment }}
permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        type: choice
        description: "Environment"
        required: true
        options:
          - dev
          - test
          - prod
        default: "dev"
      applications:
        description: "Comma separated list of application Image Streams to prune"
        required: true
        default: "web-sims, api-sims, queue-consumers-sims, workers-sims"
      ocjobs:
        description: "Comma separated list of job Image Streams to prune"
        required: true
        default: "migrations-job"
      prefix:
        description: "Branch prefix to restrict pruning to"
        required: false
        default: "main"
      minTags:
        description: "Minimum number of prefix (main) tags to keep per Image Stream"
        required: false
        default: "2"
  schedule:
    - cron: "0 14 * * *" # Runs at 6 AM Pacific every day

jobs:
  prune-images:
    runs-on: ubuntu-latest
    steps:
      - name: Set default inputs when triggered via schedule
        run: |
          echo "ENVIRONMENT=${{ inputs.environment || 'dev' }}" >> $GITHUB_ENV
          echo "APPLICATIONS=${{ inputs.applications || 'web-sims, api-sims, queue-consumers-sims, workers-sims' }}" >> $GITHUB_ENV
          echo "OCJOBS=${{ inputs.ocjobs || 'migrations-job' }}" >> $GITHUB_ENV
          echo "PREFIX=${{ inputs.prefix || 'main' }}" >> $GITHUB_ENV
          echo "MIN_TAGS=${{ inputs.minTags || '2' }}" >> $GITHUB_ENV

      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Print env
        run: |
          echo "Environment: ${ENVIRONMENT}"
          echo "Applications: ${APPLICATIONS}"
          echo "Jobs: ${OCJOBS}"
          echo "Prefix: ${PREFIX}"
          echo "Minimum Tags: ${MIN_TAGS}"
          echo "Node Version: $(node --version)"

      - name: Install dependencies
        run: npm ci
        working-directory: devops/image-pruner

      - name: Prune ImageStream Tags
        run: npm run prune
        working-directory: devops/image-pruner
        env:
          SA_TOKEN: ${{ secrets.SA_TOKEN }}
          OPENSHIFT_URL: ${{ vars.OPENSHIFT_CLUSTER_URL }}
          LICENSE_PLATE: ${{ vars.OPENSHIFT_LICENSE_PLATE }}
          ENVIRONMENT: ${{ env.ENVIRONMENT }}
          APPLICATIONS: ${{ env.APPLICATIONS }}
          OCJOBS: ${{ env.OCJOBS }}
          PREFIX: ${{ env.PREFIX }}
          MIN_TAGS: ${{ env.MIN_TAGS }}

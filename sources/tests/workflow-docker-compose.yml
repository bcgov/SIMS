services:
  zeebe:
    image: camunda/camunda:${CAMUNDA_PLATFORM_VERSION}
    container_name: zeebe-test
    ports:
      - "26500:26500"
      - "9600:9600"
    configs:
      - source: orchestration-config
        target: /usr/local/camunda/config/application.yaml
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/9600 && echo -e \"GET /actuator/health/status HTTP/1.1\r\nHost: localhost\r\n\r\n\" >&3 && head -n 1 <&3'",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
  workflow:
    image: workflow-${PROJECT_NAME}:${BUILD_REF}-${BUILD_ID}
    container_name: workers-${PROJECT_NAME}-${BUILD_REF}-${BUILD_ID}
    build:
      context: ../packages/backend
      dockerfile: ./workflow/Dockerfile.dev
    environment:
      - NODE_ENV=docker
      - ZEEBE_GRPC_ADDRESS=grpc://zeebe:26500
      - CAMUNDA_OAUTH_DISABLED=${CAMUNDA_OAUTH_DISABLED}
      - ZEEBE_CLIENT_MAX_RETRIES=20
    restart: always
    depends_on:
      - zeebe
configs:
  orchestration-config:
    content: |
      spring:
        profiles:
          # This sets the 'standalone' profile which is required to run just Zeebe without secondary storage.
          active: broker,standalone
      camunda:
        data:
          secondary-storage:
            type: none
        security:
          authentication:
            method: basic
            unprotected-api: true
          authorizations:
            enabled: false

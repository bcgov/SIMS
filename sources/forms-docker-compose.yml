services:
  mongo:
    image: mongo:8.0.11
    restart: unless-stopped
    volumes:
      - mdb-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME:
      MONGO_INITDB_ROOT_PASSWORD:
    networks:
      - local-network

  formio:
    build:
      context: ./packages/forms
      dockerfile: Dockerfile.dev
      args:
        - FORMIO_SOURCE_REPO_URL=${FORMIO_SOURCE_REPO_URL}
        - FORMIO_SOURCE_REPO_REF=${FORMIO_SOURCE_REPO_REF}
        - FORMIO_CORE_VERSION=${FORMIO_CORE_VERSION}
        - FORMIO_JS_VERSION=${FORMIO_JS_VERSION}
        - FORMIO_VM_VERSION=${FORMIO_VM_VERSION}
    # The app will restart until Mongo is listening
    restart: unless-stopped
    links:
      - mongo
    ports:
      - "3001:3001"
    # The application wants to download things to the local directory
    volumes:
      - ./:/app:rw
    networks:
      - local-network
    environment:
      DEBUG: formio:*
      NODE_CONFIG: '{"mongo": "mongodb://mongo:27017/formio"}'
      ROOT_EMAIL: ${FORMS_SA_USER_NAME}
      ROOT_PASSWORD: ${FORMS_SA_PASSWORD}
      API_KEYS: ${FORMS_API_KEY}
    stdin_open: true # -i
    tty: true # -t

# Networks
networks:
  local-network:
    external: true

volumes:
  mdb-data:
    name: formio-mongo-data
